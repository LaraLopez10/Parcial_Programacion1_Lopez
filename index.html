<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
    <h1 class="text-center mb-4">Celulares</h1>

    <!-- Buscador -->
    <div class="mb-4">
        <input type="number" id="buscarId" class="form-control mb-2" placeholder="Buscar por ID">
        <button class="btn btn-primary" onclick="buscarCelular()">Buscar</button>
        <button class="btn btn-secondary" onclick="getCelulares()">Ver todos</button>
    </div>

    <!-- Contenedor -->
    <div id="celulares" class="row"></div>

    <!-- Formulario -->
    <h3 class="mt-4">Cargar Celular</h3>
    <form onsubmit="cargarCelular(event)">
        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre" required>
        <input type="number" id="precio" class="form-control mb-2" placeholder="Precio" required>
        <input type="number" id="stock" class="form-control mb-2" placeholder="Stock">

        <button type="submit" class="btn btn-success">Guardar</button>
    </form>
</div>

<!-- IMPORTANTE: orden de scripts -->
<script src="getAll.js"></script>
<script src="getbyid.js"></script>
<script src="post.js"></script>
<script src="put.js"></script>
<script src="delete.js"></script>

</body>
</html>
